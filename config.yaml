providers:
  nvidia:
    apiKey: "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"  # 替换为你的NVIDIA API Key
    baseUrl: "https://integrate.api.nvidia.com/v1"

models:
  - name: "kimi-k2.5"
    provider: "nvidia"
    model: "moonshot-ai/kimi-k2.5"
    maxContext: 8192  # 拉满上下文窗口，支持长文档处理
    temperature: 0.7  # 平衡创造力与稳定性
    maxTokens: 4096   # 单次回复最大长度

agent:
  defaultModel: "kimi-k2.5"  # 设置默认模型
  tools: true  # 启用工具调用（浏览器、文件操作等）
  multimodal: true  # 启用多模态（图像理解、视频摘要）
